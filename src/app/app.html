<!-- Premium Loading Screen -->
@if (loading) {
  <div class="loader">
    <div class="loader-content">
      <div class="loader-logo">
        <span class="loader-bracket">&lt;</span>chatjbt<span class="loader-bracket"> /&gt;</span>
      </div>
      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>
      <p class="loader-text">Loading Portfolio</p>
    </div>
  </div>
}

<!-- App Shell -->
<div class="app-shell" [class.is-loading]="loading">
  <!-- Top Navbar -->
  <header class="navbar">
    <div class="navbar-inner">
      <a routerLink="/" class="navbar-logo" (click)="onRouteChange()">
        <span class="logo-bracket">&lt;</span>chatjbt<span class="logo-bracket"> /&gt;</span>
      </a>

      <nav class="navbar-nav" [class.mobile-open]="mobileMenuOpen">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="nav-active"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            class="nav-link"
            (click)="onRouteChange()"
          >
            <i [attr.data-lucide]="item.icon" style="width:16px;height:16px"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="navbar-actions">
        <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDark ? 'Switch to light mode' : 'Switch to dark mode'">
          @if (isDark) {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          }
        </button>
        <button class="mobile-menu-btn" (click)="toggleMobileMenu()" aria-label="Toggle menu">
          @if (mobileMenuOpen) {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          }
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile overlay -->
  @if (mobileMenuOpen) {
    <div class="mobile-overlay" (click)="closeMobileMenu()"></div>
  }

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet />
  </main>

  <!-- Floating Mobile Theme Toggle -->
  <button class="mobile-theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDark ? 'Switch to light mode' : 'Switch to dark mode'">
    @if (isDark) {
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    }
  </button>
</div>
